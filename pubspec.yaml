name: gcoop
description: A commercial management app for cooperatives.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  http: ^1.1.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"        # ← بيضاء
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/logo.png
    - assets/images/image.png