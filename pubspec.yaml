name: gcoop
description: A commercial management app for cooperatives.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  intl: 0.19.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  http: ^1.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/logo.png
    - assets/images/image.png
